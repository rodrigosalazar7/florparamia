<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti 🌸</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="mensaje">
        🌸 Haz clic en la flor 🌸
    </div>

    <div class="flor">

        <!-- Tallo -->
        <div class="tallo"></div>

        <!-- Hojas -->
        <div class="hoja izquierda"></div>
        <div class="hoja derecha"></div>

        <!-- Pétalos -->
        <div class="petalo p1"></div>
        <div class="petalo p2"></div>
        <div class="petalo p3"></div>
        <div class="petalo p4"></div>
        <div class="petalo p5"></div>
        <div class="petalo p6"></div>
        <div class="petalo p7"></div>
        <div class="petalo p8"></div>

        <!-- Centro amarillo que después revela la foto -->
        <div id="centro">
            <img src="img.png" alt="Foto">
        </div>

    </div>

    <!-- Texto final -->
    <div id="textoFinal">
        Hola, buenos días
    </div>

    <script src="script.js"></script>

</body>

</html>
